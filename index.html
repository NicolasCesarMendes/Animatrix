<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animatrix V2 - Início</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topo">
    <h1>Animatrix <span>V2</span></h1>
    <p>Catálogo de animes</p>
  </header>

  <section class="controles">
    <span class="label-idade">Selecione sua faixa etária:</span>
    <div class="botoes-idade">
      <button class="btn-idade" data-idade="0">Livre</button>
      <button class="btn-idade" data-idade="12">12+</button>
      <button class="btn-idade" data-idade="14">14+</button>
      <button class="btn-idade" data-idade="16">16+</button>
      <button class="btn-idade" data-idade="18">18+</button>
    </div>
  </section>

  <main id="catalogo" class="catalogo"></main>

  <footer>
    <p>© 2026 Animatrix V2. Todos os direitos reservados.</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
